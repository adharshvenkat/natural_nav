name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  projection-tests:
    name: Projection geometry unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test deps
        run: pip install "numpy<2" pytest
      - name: Run projection tests
        run: pytest src/natural_nav/test/test_projection.py -v
