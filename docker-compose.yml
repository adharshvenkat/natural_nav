services:
  naturalnav:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: naturalnav:latest
    container_name: naturalnav

    # ── LLM configuration ────────────────────────────────────────────────────
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-6}
      # X11 forwarding — lets Gazebo render on the host display
      - DISPLAY=${DISPLAY}
      - TURTLEBOT3_MODEL=waffle
      # NVIDIA GPU access for Gazebo sensor rendering
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - __NV_PRIME_RENDER_OFFLOAD=1
      - __GLX_VENDOR_LIBRARY_NAME=nvidia

    # ── Volume mounts ─────────────────────────────────────────────────────────
    volumes:
      # X11 socket — required for Gazebo GUI
      - /tmp/.X11-unix:/tmp/.X11-unix
      # Model weights cache — avoids re-downloading on every container start
      - naturalnav_weights:/root/.cache/naturalnav

    # ── Networking ────────────────────────────────────────────────────────────
    network_mode: host

    # ── GPU (NVIDIA Container Toolkit) ────────────────────────────────────────
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # ── Runtime ───────────────────────────────────────────────────────────────
    privileged: false
    restart: unless-stopped

    stdin_open: true
    tty: true

# Named volume for model weights (persists across container restarts)
volumes:
  naturalnav_weights:
